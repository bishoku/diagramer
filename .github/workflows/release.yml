# .github/workflows/release.yml
name: Release Tauri App

on:
  push:
    tags:
      - 'v*' # v1.0.0, v0.0.1, vb.c.d vb. şeklinde etiketler pushlandığında tetiklenir

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }} # Pushlanan tag adını kullanır (örn: v0.0.1)
          releaseName: 'Diagrammer ${{ github.ref_name }}'
          releaseBody: 'Release version ${{ github.ref_name }}. See below for platform binaries.'
          releaseDraft: false
          prerelease: false
